spring:
  application:
    name: springforge

  # H2 in-memory database for exercises
  datasource:
    url: jdbc:h2:mem:springforge
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # Disable Flyway for H2 (enable in Testcontainers tests only)
  flyway:
    enabled: false

  # Disable security auto-config by default (modules enable as needed)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ── T1-04: Configuration Properties exercises ──────────────────────
app:
  name: SpringForge
  version: 1.0.0
  debug: false
