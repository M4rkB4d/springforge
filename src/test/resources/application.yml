spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/test-tenant/v2.0
          jwk-set-uri: https://login.microsoftonline.com/test-tenant/discovery/v2.0/keys
  autoconfigure:
    exclude:
      # MongoDB — requires running server; @DataMongoTest handles its own config
      - org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveRepositoriesAutoConfiguration
